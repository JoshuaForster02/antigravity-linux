LABEL flynn
TEXT HELP
Boot Flynn OS Linux live medium on BIOS.
Install to disk, run the desktop, or perform system maintenance.
ENDTEXT
MENU LABEL Flynn OS Linux (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash

LABEL flynnspeech
TEXT HELP
Boot Flynn OS Linux with speakup screen reader enabled.
ENDTEXT
MENU LABEL Flynn OS Linux (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on quiet splash
