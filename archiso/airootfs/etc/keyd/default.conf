# Flynn OS — Mac-style keyboard (keyd)
# The Cmd key (= Super/Meta on Linux) behaves like on macOS for the classics:
#   Cmd+C/V/X  copy/paste/cut      Cmd+Z  undo     Cmd+A  select all
#   Cmd+S      save                Cmd+F  find     Cmd+W  close tab
#   Cmd+T      new tab
# Everything else (Cmd+Space, Cmd+Tab, Cmd+Q, Cmd+1..5, Cmd+Return …)
# passes through to Sway unchanged.

[ids]
*

[meta]
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
s = C-s
f = C-f
w = C-w
t = C-t
