# ─────────────────────────────────────────────────────────────────────────────
#  Flynn OS — Hyprland  ·  Ice Grid
#  The real-hardware session: animations, blur, rounded corners, shadows.
#  (VMs boot Sway instead — see ~/.bash_profile)
# ─────────────────────────────────────────────────────────────────────────────

# ── Monitors (auto; override via flynn-display → user.conf) ──────────────────
monitor = , preferred, auto, 1

# ── Environment ───────────────────────────────────────────────────────────────
env = XCURSOR_THEME, capitaine-cursors-white
env = XCURSOR_SIZE, 24
env = XDG_CURRENT_DESKTOP, Hyprland
env = QT_QPA_PLATFORM, wayland
env = GDK_BACKEND, wayland,x11

# ── Input — German QWERTZ, click-to-focus (macOS feel) ───────────────────────
input {
    kb_layout = de
    kb_options = caps:escape
    repeat_delay = 250
    repeat_rate = 40
    follow_mouse = 2
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ── Look: graphite + ice, soft radii, subtle depth ────────────────────────────
general {
    gaps_in = 8
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(9fdcf5dd) rgba(5d87a8dd) 45deg
    col.inactive_border = rgba(1c2230ff)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.97
    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true
        popups = true
    }
    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(05060aee)
    }
}

# ── Motion — quick, soft, never bouncy (adult macOS feel) ─────────────────────
animations {
    enabled = true
    bezier = ice, 0.22, 1.0, 0.36, 1.0
    bezier = soft, 0.25, 0.46, 0.45, 0.94
    animation = windows, 1, 3, ice, popin 88%
    animation = windowsOut, 1, 3, soft, popin 88%
    animation = fade, 1, 3, soft
    animation = border, 1, 6, soft
    animation = workspaces, 1, 4, ice, slide
    animation = layers, 1, 3, soft, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vrr = 1
}

# ── Window rules — floating by default (macOS), Study-Hub tiles ──────────────
windowrulev2 = float, class:.*
windowrulev2 = center, class:.*

# Study Hub: Notion + Amboss tile side by side on workspace 2
windowrulev2 = tile, title:^(Notion)
windowrulev2 = workspace 2, title:^(Notion)
windowrulev2 = tile, title:^(Amboss)
windowrulev2 = workspace 2, title:^(Amboss)
windowrulev2 = workspace 3, class:^(anki)
windowrulev2 = workspace 4, class:^(steam)

# Flynn panels
windowrulev2 = size 1100 650, app_id:^(flynn-ui)$
windowrulev2 = size 1100 650, class:^(flynn-ui)$
windowrulev2 = size 760 540, class:^(flynn-study)$
windowrulev2 = size 700 500, class:^(flynn-help)$
windowrulev2 = size 480 600, class:^(os.flynnos.settings)$

# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = bash -c '[ -f /root/.config/sway/tron-bg.png ] || python3 /usr/local/bin/flynn-wallpaper-sway >/tmp/wallpaper.log 2>&1; swaybg -i /root/.config/sway/tron-bg.png -m fill'
exec-once = waybar -c /root/.config/waybar/config-hypr -s /root/.config/waybar/style.css
exec-once = waybar -c /root/.config/waybar/dock.json -s /root/.config/waybar/dock.css
exec-once = mako --config /root/.config/mako/config
exec-once = bash -c 'sleep 1 && /usr/local/bin/flynn-daemon 2>/tmp/daemon.log'
exec-once = bash -c 'sleep 1 && /usr/local/bin/flynn-bg start 2>/tmp/bg-daemon.log'
exec-once = bash -c 'sleep 1.2 && /usr/local/bin/flynn-boot-chime 2>/dev/null'
exec-once = bash -c 'sleep 1.8 && foot --app-id=flynn-ui -e /usr/local/bin/flynn-ui'
exec-once = swayidle -w timeout 300 '/usr/local/bin/flynn-lock' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep '/usr/local/bin/flynn-lock'
exec-once = bash -c 'sleep 2 && /usr/local/bin/flynn-welcome'
exec-once = bash -c '[ ! -f /etc/flynnos/.first-boot-done ] && sleep 2.5 && /usr/local/bin/flynn-first-boot'

# ── Keybinds — identical muscle memory to the Sway session ────────────────────
$mod = SUPER

bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, D, exec, fuzzel
bind = $mod, Tab, exec, /usr/local/bin/flynn-windows
bind = ALT, Tab, exec, /usr/local/bin/flynn-windows
bind = $mod, Space, exec, /usr/local/bin/flynn-palette
bind = $mod, Escape, exec, /usr/local/bin/flynn-power
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = , F11, fullscreen, 0

# macOS minimize → special workspace
bind = $mod, M, movetoworkspace, special:hidden
bind = $mod SHIFT, M, togglespecialworkspace, hidden
bind = $mod SHIFT, Space, togglefloating

# Flynn tools (keyd owns Cmd+C/V/X/Z/A/S/F/W/T — never bind those letters)
bind = $mod, G, exec, /usr/local/bin/game-mode-switch.sh toggle
bind = $mod, N, exec, /usr/local/bin/flynn-browser https://notion.so
bind = $mod, P, exec, /usr/local/bin/flynn-dashboard
bind = $mod, U, exec, /usr/local/bin/flynn-update
bind = $mod, I, exec, /usr/local/bin/flynn-wifi
bind = $mod, O, exec, /usr/local/bin/flynn-hub
bind = $mod, Y, exec, bash -c 'cliphist list | fuzzel --dmenu -p "  Clipboard  " | cliphist decode | wl-copy'
bind = $mod SHIFT, O, exec, /usr/local/bin/flynn-ocr
bind = $mod, comma, exec, /usr/local/bin/flynn-settings
bind = $mod SHIFT, ssharp, exec, foot --app-id=flynn-help -e bash -c 'cat /usr/local/share/flynn-help.txt; read'

bind = $mod, F1, exec, /usr/local/bin/flynn-health status
bind = $mod, F2, exec, /usr/local/bin/flynn-keyboard toggle
bind = $mod, F3, exec, /usr/local/bin/flynn-display
bind = $mod, F4, exec, /usr/local/bin/flynn-nightlight
bind = $mod, F5, exec, /usr/local/bin/flynn-dnd
bind = $mod, F6, exec, /usr/local/bin/flynn-bg toggle
bind = $mod, F7, exec, /usr/local/bin/flynn-ambient toggle
bind = $mod, F8, exec, /usr/local/bin/flynn-colorpick
bind = $mod, F9, exec, /usr/local/bin/flynn-record
bind = $mod SHIFT, F9, exec, /usr/local/bin/flynn-record --region
bind = $mod, F10, exec, /usr/local/bin/flynn-sunshine --status

# Screenshots
bind = , Print, exec, bash -c 'F=~/screenshots/$(date +%Y%m%d-%H%M%S).png; mkdir -p ~/screenshots; grim "$F" && /usr/local/bin/flynn-notify screenshot "$F"'
bind = $mod, Print, exec, bash -c 'F=~/screenshots/$(date +%Y%m%d-%H%M%S).png; mkdir -p ~/screenshots; grim -g "$(slurp)" "$F" && wl-copy < "$F" && /usr/local/bin/flynn-notify clipboard "Region saved"'
bind = $mod SHIFT, Print, exec, bash -c 'grim -g "$(slurp)" - | wl-copy && /usr/local/bin/flynn-notify clipboard "Copied"'

# Audio / brightness OSD
bindl = , XF86AudioRaiseVolume, exec, bash -c 'pactl set-sink-volume @DEFAULT_SINK@ +5% && /usr/local/bin/flynn-notify volume'
bindl = , XF86AudioLowerVolume, exec, bash -c 'pactl set-sink-volume @DEFAULT_SINK@ -5% && /usr/local/bin/flynn-notify volume'
bindl = , XF86AudioMute, exec, bash -c 'pactl set-sink-mute @DEFAULT_SINK@ toggle && /usr/local/bin/flynn-notify mute'
bindl = , XF86MonBrightnessUp, exec, bash -c 'brightnessctl set +5% && /usr/local/bin/flynn-notify brightness'
bindl = , XF86MonBrightnessDown, exec, bash -c 'brightnessctl set 5%- && /usr/local/bin/flynn-notify brightness'

# Workspaces 1-5 (GRID STUDY ANKI GAME SYS)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Focus (vim + arrows)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Mouse: drag + resize floating windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# User overrides written by flynn-keyboard / flynn-display
source = /root/.config/hypr/user.conf
