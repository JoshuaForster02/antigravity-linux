[main]
font=JetBrains Mono:size=13
prompt=  LAUNCH
terminal=foot
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,filename,keywords
lines=14
width=42
horizontal-pad=20
vertical-pad=12
inner-pad=8
image-size-ratio=0.55
letter-spacing=0
layer=overlay
exit-on-keyboard-focus-loss=yes
show-actions=no

[colors]
background=000810ee
text=00d8f0ff
match=00e5ffff
selection=001a28ff
selection-text=00e5ffff
selection-match=00e5ffff
border=00e5ff55
prompt=004466ff
placeholder=003344aa

[border]
width=1
radius=10

[dmenu]
exit-immediately-if-empty=no
