# Flynn OS — Picom compositor config
# TRON-style: glow on focused windows, smooth transitions

# ── Backend ───────────────────────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
vsync = true;

# ── Shadows (TRON glow effect) ────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.85;
shadow-offset-x = -18;
shadow-offset-y = -12;
shadow-color = "#00E5FF";   # cyan glow instead of black shadow

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'tint2'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ────────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.08;
fade-delta    = 5;

fade-exclude = [
    "class_g = 'Flynn'"
];

# ── Transparency ──────────────────────────────────────────────────────────────
inactive-opacity = 0.88;
active-opacity   = 1.0;
frame-opacity    = 0.9;
inactive-opacity-override = false;

# Fully opaque windows
opacity-rule = [
    "100:class_g = 'XTerm' && focused",
    "95:class_g  = 'XTerm' && !focused",
    "100:class_g = 'mpv'",
    "100:name    = 'Flynn OS'"
];

# ── Blur (frosted glass on unfocused) ─────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = false;   # enable for frosted effect (heavier GPU)
blur-background-frame = false;
blur-kern = "3x3box";

# ── Window type rules ─────────────────────────────────────────────────────────
wintypes: {
    tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; };
    dock    = { shadow = false; };
    dnd     = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; };
};
