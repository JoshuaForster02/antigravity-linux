# Flynn OS — MangoHud TRON Skin
# Aktivierung: MANGOHUD=1 steam / oder per game launch options

legacy_layout=0
background_alpha=0.85
background_color=000810
text_color=00e5ff
font_file=/usr/share/fonts/TTF/JetBrainsMono-Regular.ttf
font_size=14
position=top-right
width=260

# Zeige FPS + GPU + CPU + VRam
fps
fps_color=00e5ff
fps_limit_method=late
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
cpu_stats
cpu_temp
vram
ram

# Benchmark
toggle_fps_limit=Shift_R+F1
toggle_logging=Shift_L+F2
toggle_hud=Shift_R+F12

# TRON Colors
gpu_color=00aacc
cpu_color=00cc66
vram_color=ccaa22
ram_color=8844cc
io_color=ff6600
frametime_color=004466
background_color=000810

# Frametime graph
frame_timing=1
histogram=1
