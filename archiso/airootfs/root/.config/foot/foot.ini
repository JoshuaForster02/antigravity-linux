# Flynn OS — Foot Terminal (TRON Edition)
[main]
font=JetBrains Mono:size=12
font-bold=JetBrains Mono:size=12:weight=Bold
dpi-aware=yes
initial-window-size-pixels=1200x700
pad=14x12
title=Flynn OS

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}

[colors]
# TRON dark palette
background=000810
foreground=00e5ff
regular0=001520   # black
regular1=ff3300   # red
regular2=00cc66   # green
regular3=ccaa22   # yellow
regular4=0088cc   # blue
regular5=8800cc   # magenta
regular6=00aacc   # cyan
regular7=80c8d8   # white
bright0=002233
bright1=ff6644
bright2=00ff88
bright3=ffcc44
bright4=00aaff
bright5=aa44ff
bright6=00e5ff
bright7=e0f8ff
selection-background=004466
selection-foreground=e0f8ff
urls=00e5ff

[cursor]
style=block
blink=yes
blink-rate=600
color=00e5ff 00e5ff

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+f
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
