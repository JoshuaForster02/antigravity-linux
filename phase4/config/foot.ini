# foot terminal — Flynn OS TRON theme
# Place at: ~/.config/foot/foot.ini

[main]
font=monospace:size=12
font-bold=monospace:style=Bold:size=12
shell=/bin/bash
term=foot
title=Flynn OS Terminal
dpi-aware=auto
pad=8x8

[scrollback]
lines=5000

[cursor]
style=block
blink=yes
blink-rate=600
color=00e5ff 00e5ff

[colors]
# TRON color scheme
background=06091a
foreground=aaddee
alpha=0.95

# Regular
regular0=0a0f1a
regular1=cc3355
regular2=22bb66
regular3=ddaa22
regular4=3388cc
regular5=aa44cc
regular6=22aacc
regular7=aabbcc

# Bright
bright0=1a2233
bright1=ee4477
bright2=33cc88
bright3=ffcc33
bright4=55aaee
bright5=cc66ee
bright6=33ddff
bright7=ddeeff

# Selection
selection-foreground=06091a
selection-background=22aacc

[key-bindings]
scrollback-up-line=shift+Up
scrollback-down-line=shift+Down
clipboard-copy=ctrl+shift+c
clipboard-paste=ctrl+shift+v
fullscreen=f11

[mouse-bindings]
selection-override-modifiers=shift
