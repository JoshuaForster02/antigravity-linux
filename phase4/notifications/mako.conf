# Flynn OS — Mako Notification Daemon Config
# Place at: ~/.config/mako/config
# Start: mako &   (already in flynn-session)
#
# Docs: https://github.com/emersion/mako

# ── Position & size ──────────────────────────────────────────────────────────
layer=overlay
anchor=top-right
margin=12
width=360
height=120
padding=14

# ── Appearance — TRON style ───────────────────────────────────────────────────
background-color=#0a0f1aee
text-color=#aaddee
border-color=#22aacc88
border-size=1
border-radius=6
progress-color=over #22aacc33

font=Fira Code 11
format=<b>%s</b>\n%b
markup=1
actions=1

# ── Timing ────────────────────────────────────────────────────────────────────
default-timeout=5000
ignore-timeout=0
max-visible=5

# ── Icons ─────────────────────────────────────────────────────────────────────
icon-path=/usr/share/icons/hicolor
max-icon-size=32

# ── Urgency levels ────────────────────────────────────────────────────────────
[urgency=low]
background-color=#06091acc
border-color=#1a334488
text-color=#556677
default-timeout=3000

[urgency=normal]
background-color=#0a0f1aee
border-color=#22aacc88
text-color=#aaddee
default-timeout=5000

[urgency=high]
background-color=#1a0a0aee
border-color=#ee4455cc
text-color=#ffaabb
default-timeout=0

# ── App-specific overrides ────────────────────────────────────────────────────
[app-name=flynn-daemon]
background-color=#0a1a0aee
border-color=#22cc8888
text-color=#88ddaa

[app-name=GameMode]
background-color=#0a0a1aee
border-color=#8866ee88
text-color=#bbaaee
default-timeout=3000

[app-name=Steam]
background-color=#0a0f1aee
border-color=#4488bb88
