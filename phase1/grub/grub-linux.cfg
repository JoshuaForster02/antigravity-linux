set default=0
set timeout=4

# ── Pure text/console mode — works in QEMU, VirtualBox, and real hardware ────
# NOTE: gfxterm + nomodeset = black screen in QEMU (GRUB sets graphics mode,
#       kernel can't use it). The Flynn OS shell renders beautifully in text.
#       The installed GRUB on real hardware uses a separate gfx config.
terminal_input  console
terminal_output console

# ── Boot entries ──────────────────────────────────────────────────────────────
menuentry "Flynn OS Linux 1.0  //  The Grid" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=tty0 \
           net.ifnames=0 biosdevname=0 \
           loglevel=3 quiet
    initrd /boot/initrd.img
}

menuentry "Flynn OS Linux  [verbose boot]" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=tty0 \
           net.ifnames=0 biosdevname=0 \
           loglevel=7
    initrd /boot/initrd.img
}

menuentry "Flynn OS Linux  [recovery shell]" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=tty0 \
           init=/bin/sh \
           rw
    initrd /boot/initrd.img
}
