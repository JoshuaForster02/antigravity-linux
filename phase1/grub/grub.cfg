# ── Flynn OS Linux — GRUB config ─────────────────────────────────────────────
# Default to text-mode for reliable QEMU boot.
# X11 / graphical session starts AFTER login via .xinitrc / startx.
# ─────────────────────────────────────────────────────────────────────────────

set default=0
set timeout=5

# Force text mode — most reliable across QEMU / VirtualBox / real hardware
terminal_input  console
terminal_output console

# TRON colors for the GRUB text menu
set color_normal=light-cyan/black
set color_highlight=black/cyan
set menu_color_normal=light-cyan/black
set menu_color_highlight=black/cyan

# ── Boot entries ──────────────────────────────────────────────────────────────

menuentry "  Flynn OS Linux  1.0  (text login -> startx for GUI)" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=tty1 \
           rw \
           loglevel=3 \
           init=/init
    initrd /boot/initrd.img
}

menuentry "  Flynn OS  [verbose boot — shows all kernel messages]" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=tty1 \
           rw \
           init=/init
    initrd /boot/initrd.img
}

menuentry "  Flynn OS  [QEMU serial debug — output in terminal]" {
    linux  /boot/vmlinuz \
           nomodeset \
           console=ttyS0,115200 \
           console=tty1 \
           rw \
           init=/init
    initrd /boot/initrd.img
}
