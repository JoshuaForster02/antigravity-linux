set default=0
set timeout=4

insmod all_video
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus

if loadfont ($root)/boot/grub/fonts/unicode.pf2; then
    set gfxmode=1024x768x32,800x600x32,auto
    insmod gfxterm
    terminal_output gfxterm
fi

# ── TRON color scheme ─────────────────────────────────────────────────────────
set color_normal=cyan/black
set color_highlight=white/cyan
set menu_color_normal=light-cyan/black
set menu_color_highlight=white/cyan

menuentry "  Flynn OS Linux  1.0" {
    linux   /boot/vmlinuz root=/dev/sr0 quiet loglevel=0 \
            vt.global_cursor_default=0 console=tty1
    initrd  /boot/initrd.img
}

menuentry "  Flynn OS  [verbose boot]" {
    linux   /boot/vmlinuz root=/dev/sr0 console=tty1
    initrd  /boot/initrd.img
}

menuentry "  Flynn OS  [safe / text mode]" {
    terminal_output console
    linux   /boot/vmlinuz root=/dev/sr0 nomodeset console=tty1
    initrd  /boot/initrd.img
}
