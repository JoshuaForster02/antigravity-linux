name: Flynn OS — Build Arch Linux ISO

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'archiso/**'
      - 'daemon/**'
      - 'phase2/**'
      - 'phase4/**'
      - '.github/workflows/build-arch-iso.yml'
  workflow_dispatch:   # manual trigger from GitHub UI → Actions tab

concurrency:
  group: build-arch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for creating GitHub Releases

jobs:
  build:
    name: Build Flynn OS Arch ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Build inside Arch Linux Docker ────────────────────────────────────────
      # GitHub Actions runners are x86_64 Ubuntu, so Arch Docker works natively.
      # No cross-compilation, no Rosetta, no pacman-key entropy issues.
      - name: Prepare output directory
        run: mkdir -p "${{ github.workspace }}/archiso/output"

      - name: Build ISO inside archlinux container
        run: |
          docker run --rm --privileged \
            --shm-size=512m \
            --tmpfs /isoout:exec,size=2g \
            -v "${{ github.workspace }}/archiso:/build" \
            -v "${{ github.workspace }}/archiso/output:/output" \
            archlinux:latest \
            bash -c "
              set -euo pipefail
              mkdir -p /output /work

              echo '=== Initializing pacman ==='
              pacman-key --init
              pacman-key --populate archlinux

              echo '=== Installing archiso ==='
              pacman -Syu --noconfirm
              pacman -S --noconfirm --needed archiso grub efibootmgr mtools squashfs-tools dosfstools

              echo '=== Validating package list ==='
              pacman -Sy --noconfirm --config /build/pacman.conf
              grep -vE '^[[:space:]]*(#|$)' /build/packages.x86_64 \
                | xargs pacman -Sp --noconfirm --config /build/pacman.conf --print-format '%n' \
                | tail -5

              echo '=== Setting permissions ==='
              find /build/airootfs/usr/local/bin/ -type f -exec chmod +x {} \; 2>/dev/null || true
              find /build/airootfs/opt/flynn/ -name '*.py' -exec chmod +x {} \; 2>/dev/null || true
              chmod +x /build/customize_airootfs.sh

              echo '=== Building Flynn OS ISO ==='
              mkarchiso -v -w /work -o /isoout /build

              echo '=== Kopiere ISO nach /output ==='
              cp /isoout/*.iso /output/

              echo '=== Done ==='
              ls -lh /output/*.iso
            "

      - name: Generate checksum
        run: |
          cd archiso/output
          sha256sum *.iso > flynnos-arch.iso.sha256
          cat flynnos-arch.iso.sha256
          echo "ISO_SIZE=$(du -sh *.iso | cut -f1)" >> $GITHUB_ENV

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynnos-arch-${{ github.sha }}
          path: |
            archiso/output/*.iso
            archiso/output/*.sha256
          retention-days: 30

      # GitHub Releases cap assets at 2 GB — ISO downloads via Actions Artifacts.
      - name: Build summary
        run: |
          echo "## Flynn OS ISO ready" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: ${{ env.ISO_SIZE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download: Actions → this run → Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- Login: root / tron" >> "$GITHUB_STEP_SUMMARY"
