name: Flynn OS — Status Badge

on:
  workflow_run:
    workflows: ["Flynn OS — Build ISO"]
    types: [completed]

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - name: Update badge
        run: |
          STATUS="${{ github.event.workflow_run.conclusion }}"
          echo "Build status: $STATUS"
          # Badge is auto-generated by GitHub via shields.io
          # Use this URL in README:
          # https://github.com/JoshuaForster02/antigravity-linux/actions/workflows/build-iso.yml/badge.svg
