# Legacy alias — primary build is build-arch-iso.yml
# Manual trigger only to avoid duplicate CI runs + 2GB release limit issues.
name: Flynn OS — Build ISO (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Flynn OS ISO (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - name: Build ISO
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace/archiso \
            archlinux:latest \
            bash -c "
              set -euo pipefail
              pacman-key --init && pacman-key --populate archlinux
              pacman -Syu --noconfirm
              pacman -S --noconfirm archiso grub mtools squashfs-tools efibootmgr dosfstools
              find airootfs/usr/local/bin -type f -exec chmod +x {} \;
              chmod +x customize_airootfs.sh
              mkdir -p /work /workspace/output
              mkarchiso -v -w /work -o /workspace/output .
              ls -lh /workspace/output/*.iso
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynn-os-linux-manual-${{ github.run_number }}
          path: output/*.iso
          retention-days: 14
